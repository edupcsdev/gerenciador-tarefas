<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConnect | Gerenciador de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body class="bg-light">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark fixed-top shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="bi bi-code-slash me-2"></i>DevConnect
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav align-items-center">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Início</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Sobre</a>
                        </li>
                        <li class="nav-item me-3"> <a class="nav-link" href="#">Contato</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-outline-light btn-sm px-3" href="#">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container pt-5 my-5">
        <div class="row g-4 align-items-start mt-4">

            <section class="col-12 col-lg-5">
                <div class="card shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h2 class="h4 fw-bold text-dark">Nova tarefa</h2>
                            <p class="text-muted small">Adicione um item à sua lista!</p>
                        </div>

                        <form id="form-tarefa">
                            <div class="mb-3">
                                <label for="nomeTarefa" class="form-label"><i class="bi bi-bookmark-fill me-2"></i>Nome
                                    da Tarefa</label>
                                <input type="text" class="form-control" id="nomeTarefa"
                                    placeholder="Ex: Estudar Rotas de API, Desenvolver uma página Web...">
                            </div>

                            <div class="mb-3">
                                <label for="categoriaTarefa" class="form-label">
                                    <i class="bi bi-tag-fill me-2"></i>Categoria
                                </label>
                                <select class="form-select" id="categoriaTarefa">
                                    <option value="Estudos" selected>Estudos</option>
                                    <option value="Trabalho">Trabalho</option>
                                    <option value="Pessoal">Pessoal</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Adicionar Item</button>
                        </form>
                    </div>
                </div>
            </section>
            
            <section class="col-12 col-lg-7">
                <div class="card shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h3 class="h5 fw-bold mb-3"><i class="bi bi-list-task me-2"></i>Minhas Tarefas</h3>

                        <ul id="lista-tarefas" class="list-group">
                        </ul>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-custom-dark text-white text-center py-3 fixed-bottom mt-5">
        <p class="mb-0 small">&copy; 2026 DevConnect - Desenvolvido por Eduardo Silva</p>
    </footer>

    <script src="js/app.js"></script>
</body>

</html>
